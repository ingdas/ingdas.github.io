  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #121212; color: #e0e0e0; }

    #main { max-width: 680px; margin: 0 auto; padding: 16px; }

    #searchWrap { position: relative; }
    #searchBox {
      width: 100%; padding: 12px 16px;
      border: 1px solid #333; border-radius: 8px;
      font-size: 1rem; background: #1e1e1e; color: #e0e0e0;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    #searchBox:focus { outline: none; border-color: #5b9bd5; box-shadow: 0 0 0 2px #5b9bd533; }
    #searchBox::placeholder { color: #666; }

    #suggestions {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #1e1e1e; border: 1px solid #444; border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
      z-index: 100; display: none;
    }
    .sug-item {
      padding: 9px 16px; cursor: pointer; font-size: 0.92rem; color: #ccc;
    }
    .sug-item:first-child { border-radius: 8px 8px 0 0; }
    .sug-item:last-child  { border-radius: 0 0 8px 8px; }
    .sug-item:only-child  { border-radius: 8px; }
    .sug-item:hover, .sug-item.focused { background: #2a3d52; color: #e0e0e0; }

    #corsNote {
      background: #2a2500; border: 1px solid #665500; border-radius: 6px;
      padding: 10px 14px; margin-top: 12px; font-size: 0.82rem; display: none; color: #ffdd57;
    }

    #status { font-size: 0.8rem; color: #666; margin-top: 10px; min-height: 18px; }
    #status.error { color: #ef5350; }
    #status.sent  { color: #66bb6a; }

    #results { margin-top: 12px; }

    .song {
      background: #1e1e1e; border-radius: 8px; padding: 10px 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    .song-top {
      display: flex; gap: 12px; align-items: center;
    }
    .song img { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .song .info { flex: 1; overflow: hidden; }
    .song .title  { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song .artist { font-size: 0.85rem; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song .arr    { font-size: 0.75rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .song-top { cursor: pointer; }
    .song-top:hover .title { color: #5b9bd5; }

    .open-btn {
      width: 100%; margin-top: 10px; padding: 7px;
      border: 1px solid #333; border-radius: 5px;
      background: #2a2a2a; color: #aaa; cursor: pointer;
      font-size: 0.82rem; font-weight: 500;
      transition: background .1s;
    }
    .open-btn:hover { background: #1a2d42; border-color: #5b9bd5; color: #e0e0e0; }
    .open-btn.active { background: #1976d2; border-color: #1565c0; color: #fff; }

    .t-row {
      display: flex; gap: 4px; align-items: center; margin-top: 10px;
    }
    .t-btn {
      padding: 5px 10px; border: 1px solid #333; border-radius: 5px;
      background: #2a2a2a; color: #aaa; cursor: pointer;
      font-size: 0.78rem; font-weight: 500;
      transition: background .1s; white-space: nowrap;
    }
    .t-btn:hover  { background: #1a2d42; border-color: #5b9bd5; color: #e0e0e0; }
    .t-btn.active { background: #1976d2; border-color: #1565c0; color: #fff; }
    .t-select {
      padding: 5px 6px; border: 1px solid #333; border-radius: 5px;
      background: #2a2a2a; color: #aaa; cursor: pointer;
      font-size: 0.78rem; font-weight: 500;
      transition: background .1s; margin-left: auto;
    }
    .t-select:focus { outline: none; border-color: #5b9bd5; }
    .t-select.active { background: #1976d2; border-color: #1565c0; color: #fff; }

    #manualPanel {
      margin-top: 32px; background: #1e1e1e; border: 1px solid #333;
      border-radius: 8px; padding: 14px 16px;
    }
    #manualPanel h3 { font-size: 0.85rem; color: #888; margin-bottom: 12px; font-weight: 500; }
    .m-field {
      display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px;
    }
    .m-field label { font-size: 0.75rem; color: #666; }
    .m-field input {
      padding: 7px 10px; border: 1px solid #333; border-radius: 5px;
      background: #2a2a2a; color: #e0e0e0; font-size: 0.88rem;
    }
    .m-field input:focus { outline: none; border-color: #5b9bd5; }
    #manualSend {
      width: 100%; margin-top: 4px; padding: 8px;
      border: 1px solid #333; border-radius: 5px;
      background: #2a2a2a; color: #aaa; cursor: pointer;
      font-size: 0.85rem; font-weight: 500; transition: background .1s;
    }
    #manualSend:hover { background: #1a2d42; border-color: #5b9bd5; color: #e0e0e0; }
    #manualSend:active { background: #1976d2; border-color: #1565c0; color: #fff; }
  </style>
</head>
<body>

<div id="main">
  <div id="searchWrap">
    <input id="searchBox" type="search" placeholder="Search Sheet Music Direct…" autocomplete="off" />
    <div id="suggestions"></div>
  </div>
  <div id="corsNote">Search failed. Check your internet connection and try again.</div>
  <div id="status"></div>
  <div id="results"></div>

  <div id="manualPanel">
    <h3>Manual Send</h3>
    <div class="m-field"><label>Product ID</label><input id="m-id" type="text" placeholder="e.g. 123456" /></div>
    <div class="m-field"><label>Title</label><input id="m-title" type="text" placeholder="Song title" /></div>
    <div class="m-field"><label>Artist</label><input id="m-artist" type="text" placeholder="Artist name" /></div>
    <div class="m-field"><label>Cover URL</label><input id="m-cover" type="url" placeholder="https://…" /></div>
    <div class="m-field"><label>Semitones</label><input id="m-semitones" type="number" value="0" min="-6" max="6" /></div>
    <button id="manualSend">Send to device</button>
  </div>
</div>

<script>
  const TOPIC      = 'sheetshare-home'; // must match NTFY_TOPIC in SheetShareApplication.kt
  const SEARCH_URL = 'https://mobileapi.sheetmusicdirect.com/1.0/devices/82419D36-C4A5-4861-91D2-BB8B648FC107/searchwithfacets';
  const PROXY      = url => `https://corss.ingel.ing/?url=${encodeURIComponent(url)}`;
  // ── Search ────────────────────────────────────────────────────────────────
  const SUGGEST_URL = 'https://www.sheetmusicdirect.com/api/frontend/SearchKeywordSuggest.ashx';

  const searchBox  = document.getElementById('searchBox');
  const resultsEl  = document.getElementById('results');
  const statusEl   = document.getElementById('status');
  const suggestEl  = document.getElementById('suggestions');
  let debounce, sugDebounce, focusedIdx = -1;

  // ── Suggestions ───────────────────────────────────────────────────────────
  function showSuggestions(items) {
    suggestEl.innerHTML = '';
    focusedIdx = -1;
    if (!items.length) { suggestEl.style.display = 'none'; return; }
    items.forEach(text => {
      const d = document.createElement('div');
      d.className = 'sug-item';
      d.textContent = text;
      d.addEventListener('mousedown', e => {
        e.preventDefault();
        searchBox.value = text;
        hideSuggestions();
        doSearch(text);
      });
      suggestEl.appendChild(d);
    });
    suggestEl.style.display = 'block';
  }

  function hideSuggestions() { suggestEl.style.display = 'none'; focusedIdx = -1; }

  async function fetchSuggestions(term) {
    try {
      const res = await fetch(PROXY(`${SUGGEST_URL}?limit=10&term=${encodeURIComponent(term)}`));
      if (!res.ok) return;
      showSuggestions(await res.json());
    } catch (_) {}
  }

  searchBox.addEventListener('keydown', e => {
    const items = suggestEl.querySelectorAll('.sug-item');
    if (!items.length || suggestEl.style.display === 'none') return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (focusedIdx >= 0) items[focusedIdx].classList.remove('focused');
      focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
      items[focusedIdx].classList.add('focused');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (focusedIdx >= 0) items[focusedIdx].classList.remove('focused');
      focusedIdx = Math.max(focusedIdx - 1, 0);
      items[focusedIdx].classList.add('focused');
    } else if (e.key === 'Enter' && focusedIdx >= 0) {
      e.preventDefault();
      const text = items[focusedIdx].textContent;
      searchBox.value = text;
      hideSuggestions();
      doSearch(text);
    } else if (e.key === 'Escape') {
      hideSuggestions();
    }
  });

  searchBox.addEventListener('blur', () => setTimeout(hideSuggestions, 150));

  // ── Search ────────────────────────────────────────────────────────────────
  searchBox.addEventListener('input', () => {
    clearTimeout(debounce);
    clearTimeout(sugDebounce);
    const q = searchBox.value.trim();
    if (!q) { resultsEl.innerHTML = ''; statusEl.textContent = ''; hideSuggestions(); return; }
    sugDebounce = setTimeout(() => fetchSuggestions(q), 150);
    debounce = setTimeout(() => doSearch(q), 350);
  });

  async function doSearch(query) {
    statusEl.className = '';
    statusEl.textContent = 'Searching…';
    const body = JSON.stringify({ query, limit: 20, page: 1, sort: [] });
    try {
      const res = await fetch(PROXY(SEARCH_URL), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      document.getElementById('corsNote').style.display = 'none';
      renderResults(data.Products || []);
      statusEl.textContent = data.Products?.length ? '' : 'No results.';
    } catch (e) {
      statusEl.className = 'error';
      statusEl.textContent = 'Search failed — see note below.';
      document.getElementById('corsNote').style.display = 'block';
    }
  }

  function renderResults(products) {
    products = [...products].sort((a, b) => {
      const titleCmp = a.title.localeCompare(b.title);
      if (titleCmp !== 0) return titleCmp;
      const isPV = s => /piano\s*&\s*vocal/i.test(s ?? '');
      return isPV(b.arrangement) - isPV(a.arrangement);
    });
    resultsEl.innerHTML = '';
    for (const p of products) {
      const div = document.createElement('div');
      div.className = 'song';

      let semitone = 0;

      const top = document.createElement('div');
      top.className = 'song-top';
      const isPdf = p.score_type === 'Pdf';
      top.innerHTML = `
        <img src="${esc(p.url_album_img)}" alt="" loading="lazy" onerror="this.style.display='none'" />
        <div class="info">
          <div class="title">${esc(p.title)}</div>
          <div class="artist">${esc(p.artist)}</div>
          <div class="arr">${esc(p.arrangement)}</div>
        </div>
      `;
      div.appendChild(top);

      if (isPdf) {
        const btn = document.createElement('button');
        btn.className = 'open-btn';
        btn.textContent = 'Open on device';
        btn.addEventListener('click', () => {
          btn.classList.add('active');
          openSongAt(p.id, p.title, 0, p.url_album_img, p.artist);
        });
        div.appendChild(btn);
      } else {
        top.addEventListener('click', () => openSongAt(p.id, p.title, semitone, p.url_album_img, p.artist));

        const row = document.createElement('div');
        row.className = 't-row';

        let activeQuick = null;

        const setTranspose = (n, sourceEl, isQuick) => {
          if (activeQuick) activeQuick.classList.remove('active');
          activeQuick = null;
          sel.classList.remove('active');
          if (isQuick) {
            activeQuick = sourceEl;
            sourceEl.classList.add('active');
            sel.value = String(n);
          } else {
            sel.classList.add('active');
          }
          semitone = n;
          top.click();
        };

        const makeQuickBtn = n => {
          const btn = document.createElement('button');
          btn.className = 't-btn';
          btn.textContent = n > 0 ? `+${n}` : '0';
          btn.addEventListener('click', () => setTranspose(n, btn, true));
          return btn;
        };

        for (const n of [0, 3, 5, 6]) row.appendChild(makeQuickBtn(n));

        const sel = document.createElement('select');
        sel.className = 't-select';
        for (let n = -6; n <= 6; n++) {
          const opt = document.createElement('option');
          opt.value = String(n);
          opt.textContent = n > 0 ? `+${n}` : String(n);
          if (n === 0) opt.selected = true;
          sel.appendChild(opt);
        }
        sel.addEventListener('change', () => setTranspose(parseInt(sel.value), sel, false));
        row.appendChild(sel);

        div.appendChild(row);
      }
      resultsEl.appendChild(div);
    }
  }

  // ── Send to Android ───────────────────────────────────────────────────────
  async function openSongAt(productId, title, semitones, coverUrl, artist) {
    statusEl.className = '';
    statusEl.textContent = 'Sending…';
    await sendToDevice({ type: 'song', productId, title, coverUrl, artist });
    await sendToDevice({ type: 'transpose', semitones });
    statusEl.className = 'sent';
    statusEl.textContent = `✓ "${title}"` + (semitones !== 0 ? ` at ${semitones > 0 ? '+' : ''}${semitones}` : '');
  }

  async function sendToDevice(payload) {
    const res = await fetch(`https://ntfy.ingel.ing/${encodeURIComponent(TOPIC)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`ntfy ${res.status}`);
  }

  // ── Manual Send ───────────────────────────────────────────────────────────
  document.getElementById('manualSend').addEventListener('click', async () => {
    const productId = document.getElementById('m-id').value.trim();
    const title     = document.getElementById('m-title').value.trim();
    const artist    = document.getElementById('m-artist').value.trim();
    const coverUrl  = document.getElementById('m-cover').value.trim();
    const semitones = parseInt(document.getElementById('m-semitones').value) || 0;
    if (!productId || !title) {
      statusEl.className = 'error';
      statusEl.textContent = 'Product ID and Title are required.';
      return;
    }
    await openSongAt(productId, title, semitones, coverUrl, artist);
  });

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
