<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f472b6;
      margin-bottom: 8px;
    }

    #score-line {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      height: 18px;
    }

    #game-wrap {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    #canvas {
      border: 2px solid #222;
      border-radius: 8px;
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }

    #side-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .panel-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-val {
      font-size: 20px;
      font-weight: 700;
      color: #e8e8e8;
    }

    #next-canvas, #hold-canvas {
      border: 1px solid #222;
      border-radius: 6px;
      display: block;
    }

    #message {
      margin-top: 16px;
      font-size: 14px;
      color: #888;
      height: 20px;
      text-align: center;
    }

    #toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e8e8e8;
      transition: background 0.15s;
    }
    button:hover { background: #252525; }
    button:active { background: #111; }
  </style>
</head>
<body>
  <h1>Tetris</h1>
  <div id="score-line">Score: <span id="score">0</span></div>

  <div id="game-wrap">
    <canvas id="canvas"></canvas>
    <div id="side-panel">
      <div class="panel-section">
        <div class="panel-label">Next</div>
        <canvas id="next-canvas" width="80" height="72"></canvas>
      </div>
      <div class="panel-section">
        <div class="panel-label">Hold</div>
        <canvas id="hold-canvas" width="80" height="72"></canvas>
      </div>
      <div class="panel-section">
        <div class="panel-label">Level</div>
        <div class="panel-val" id="level">1</div>
      </div>
      <div class="panel-section">
        <div class="panel-label">Lines</div>
        <div class="panel-val" id="lines">0</div>
      </div>
    </div>
  </div>

  <div id="message">Press Space or click to start</div>

  <div id="toolbar">
    <button id="btn-restart">Restart</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
