<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Breaker</title>
  <script src="/sdk/cg-sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 8px;
    }

    #score-line {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      height: 18px;
    }

    #best-score {
      margin-left: 16px;
      color: #facc15;
    }

    canvas {
      border: 2px solid #222;
      border-radius: 8px;
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }

    #message {
      margin-top: 16px;
      font-size: 14px;
      color: #888;
      height: 20px;
      text-align: center;
    }

    #toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e8e8e8;
      transition: background 0.15s;
    }
    button:hover { background: #252525; }
    button:active { background: #111; }

    #btn-who {
      border-color: #6c63ff44;
      color: #a29bfe;
    }
  </style>
</head>
<body>
  <h1>Block Breaker</h1>
  <div id="score-line">Score: <span id="score">0</span><span id="best-score"></span></div>
  <canvas id="canvas"></canvas>
  <div id="message">Move mouse or arrow keys · click to start</div>

  <div id="toolbar">
    <button id="btn-restart">Restart</button>
    <button id="btn-who">Who am I?</button>
  </div>

  <script>
    const SDK = window.CrazyGames.SDK
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const scoreEl = document.getElementById('score')
    const bestScoreEl = document.getElementById('best-score')
    const messageEl = document.getElementById('message')

    const W = 400
    const H = 400
    canvas.width  = W
    canvas.height = H

    const COLS = 10
    const ROWS = 5
    const BRICK_W = 34
    const BRICK_H = 14
    const BRICK_GAP = 4
    const BRICK_OFFSET_X = (W - (COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2
    const BRICK_OFFSET_Y = 36

    const PADDLE_W = 72
    const PADDLE_H = 10
    const PADDLE_Y = H - 28
    const BALL_R = 6

    const BRICK_COLORS = [
      '#f87171',
      '#fb923c',
      '#facc15',
      '#4ade80',
      '#60a5fa',
    ]

    // Game state
    let bricks, paddleX, ball, score, state, rafId, keys
    // state: 'idle' | 'playing' | 'dead' | 'win'

    function makeBricks() {
      const arr = []
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          arr.push({
            x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_GAP),
            y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_GAP),
            alive: true,
            color: BRICK_COLORS[r],
          })
        }
      }
      return arr
    }

    function init() {
      bricks  = makeBricks()
      paddleX = W / 2 - PADDLE_W / 2
      ball    = { x: W / 2, y: PADDLE_Y - BALL_R - 2, vx: 3, vy: -4 }
      score   = 0
      state   = 'idle'
      keys    = {}
      scoreEl.textContent = '0'
      messageEl.textContent = 'Move mouse or arrow keys · click to start'
      if (rafId) cancelAnimationFrame(rafId)
      rafId = null
      draw()
    }

    function startGame() {
      if (state === 'playing') return
      state = 'playing'
      messageEl.textContent = ''
      SDK.game.gameplayStart()
      rafId = requestAnimationFrame(loop)
    }

    function loop() {
      tick()
      if (state === 'playing') rafId = requestAnimationFrame(loop)
    }

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)) }

    function tick() {
      // Keyboard paddle movement
      if (keys['ArrowLeft']  || keys['a']) paddleX = clamp(paddleX - 5, 0, W - PADDLE_W)
      if (keys['ArrowRight'] || keys['d']) paddleX = clamp(paddleX + 5, 0, W - PADDLE_W)

      ball.x += ball.vx
      ball.y += ball.vy

      // Side walls
      if (ball.x - BALL_R < 0) { ball.x = BALL_R;     ball.vx =  Math.abs(ball.vx) }
      if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx) }
      // Ceiling
      if (ball.y - BALL_R < 0) { ball.y = BALL_R;     ball.vy =  Math.abs(ball.vy) }

      // Paddle
      if (
        ball.vy > 0 &&
        ball.y + BALL_R >= PADDLE_Y &&
        ball.y + BALL_R <= PADDLE_Y + PADDLE_H + Math.abs(ball.vy) &&
        ball.x >= paddleX - BALL_R &&
        ball.x <= paddleX + PADDLE_W + BALL_R
      ) {
        const rel   = (ball.x - (paddleX + PADDLE_W / 2)) / (PADDLE_W / 2)
        const speed = Math.hypot(ball.vx, ball.vy)
        ball.vx = clamp(rel * speed * 0.95, -speed * 0.9, speed * 0.9)
        ball.vy = -Math.sqrt(Math.max(speed * speed - ball.vx * ball.vx, 1))
        ball.y  = PADDLE_Y - BALL_R - 1
      }

      // Bricks
      for (const b of bricks) {
        if (!b.alive) continue
        if (
          ball.x + BALL_R > b.x &&
          ball.x - BALL_R < b.x + BRICK_W &&
          ball.y + BALL_R > b.y &&
          ball.y - BALL_R < b.y + BRICK_H
        ) {
          b.alive = false
          score++
          scoreEl.textContent = score

          const ol = ball.x + BALL_R - b.x
          const or_ = b.x + BRICK_W - (ball.x - BALL_R)
          const ot = ball.y + BALL_R - b.y
          const ob = b.y + BRICK_H - (ball.y - BALL_R)
          const min = Math.min(ol, or_, ot, ob)
          if (min === ot || min === ob) ball.vy *= -1
          else ball.vx *= -1
          break
        }
      }

      if (bricks.every(b => !b.alive)) return endGame('win')
      if (ball.y - BALL_R > H) return endGame('dead')

      draw()
    }

    function endGame(result) {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null }
      state = result
      SDK.game.gameplayStop()
      messageEl.textContent = (result === 'win' ? 'You win!' : 'Game over!') + ' Score: ' + score

      SDK.score.submitScore(score).then(({ highScore }) => {
        bestScoreEl.textContent = '· Best: ' + highScore
      })

      SDK.ad.requestInterstitialAd({
        onAdFinished: () => {
          messageEl.textContent = 'Click or press Space to play again'
        },
      })

      draw()
    }

    function draw() {
      ctx.fillStyle = '#111111'
      ctx.fillRect(0, 0, W, H)

      for (const b of bricks) {
        if (!b.alive) continue
        ctx.fillStyle = b.color
        ctx.beginPath()
        ctx.roundRect(b.x, b.y, BRICK_W, BRICK_H, 3)
        ctx.fill()
      }

      // Paddle
      ctx.fillStyle = '#e8e8e8'
      ctx.beginPath()
      ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 5)
      ctx.fill()

      // Ball — idle: rest on paddle
      const bx = state === 'idle' ? paddleX + PADDLE_W / 2 : ball.x
      const by = state === 'idle' ? PADDLE_Y - BALL_R - 1 : ball.y
      ctx.fillStyle = '#e8e8e8'
      ctx.beginPath()
      ctx.arc(bx, by, BALL_R, 0, Math.PI * 2)
      ctx.fill()

      if (state === 'dead' || state === 'win') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.fillRect(0, 0, W, H)
      }
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault()
        if (state !== 'playing') { init(); startGame() }
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault()
    })
    document.addEventListener('keyup', (e) => { keys[e.key] = false })

    // Mouse — paddle follows cursor
    canvas.addEventListener('mousemove', (e) => {
      const rect   = canvas.getBoundingClientRect()
      const scaleX = W / rect.width
      paddleX = clamp((e.clientX - rect.left) * scaleX - PADDLE_W / 2, 0, W - PADDLE_W)
      if (state === 'idle') draw()
    })

    // Touch — paddle follows finger
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault()
      const rect   = canvas.getBoundingClientRect()
      const scaleX = W / rect.width
      paddleX = clamp((e.touches[0].clientX - rect.left) * scaleX - PADDLE_W / 2, 0, W - PADDLE_W)
      if (state === 'idle') draw()
    }, { passive: false })

    canvas.addEventListener('click', () => {
      if (state !== 'playing') { init(); startGame() }
    })

    document.getElementById('btn-restart').addEventListener('click', () => { init(); startGame() })

    document.getElementById('btn-who').addEventListener('click', async () => {
      messageEl.textContent = 'Fetching user…'
      const user = await SDK.user.getUser()
      messageEl.textContent = user
        ? `You are ${user.username} (${user.id})`
        : 'Not logged in'
    })

    init()
  </script>
</body>
</html>
