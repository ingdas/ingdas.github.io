<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNAPSE — Navigate the Semantic Mind</title>
  <meta name="description" content="Bridge words through semantic space using AI embeddings. A word puzzle game powered by real neural networks." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #050510;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── CSS Variables ─────────────────────────────────────────── */
    :root {
      --bg:        #050510;
      --bg2:       #0d0d24;
      --current:   #00f5d4;
      --target:    #ff6b6b;
      --visited:   #a855f7;
      --gold:      #ffd166;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --panel-bg:  rgba(255,255,255,0.04);
      --panel-border: rgba(255,255,255,0.08);
      --radius:    14px;
      --radius-sm: 8px;
      --glow-c:    0 0 20px rgba(0,245,212,0.4);
      --glow-t:    0 0 20px rgba(255,107,107,0.4);
      --glow-v:    0 0 20px rgba(168,85,247,0.4);
    }

    /* ─── Screens ───────────────────────────────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .screen canvas.bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ─── Loading Screen ────────────────────────────────────────── */
    #loading-screen { background: var(--bg); }
    .loading-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
    }
    .loading-logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 12px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--current), #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(0,245,212,0.5));
    }
    .loading-tagline {
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .loading-bar-wrap {
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .loading-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    #loading-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--current), #0ea5e9);
      border-radius: 99px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(0,245,212,0.6);
    }
    #loading-status {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }

    /* ─── Home Screen ───────────────────────────────────────────── */
    #home-screen { background: var(--bg); display: none; }
    .home-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .game-logo {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 14px;
      text-transform: uppercase;
      line-height: 1;
    }
    .logo-syn {
      background: linear-gradient(135deg, var(--current), #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(0,245,212,0.6));
    }
    .logo-apse {
      background: linear-gradient(135deg, #0ea5e9, var(--visited));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .game-subtitle {
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 260px;
    }

    /* ─── Buttons ───────────────────────────────────────────────── */
    button { cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-primary {
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--current), #0ea5e9);
      color: var(--bg);
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius);
      letter-spacing: 1px;
      box-shadow: 0 0 24px rgba(0,245,212,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(0,245,212,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      padding: 14px 24px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
    .btn-ghost {
      padding: 10px 20px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      border-radius: var(--radius-sm);
    }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .btn-icon {
      width: 40px; height: 40px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 18px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
    }
    .btn-icon:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    /* ─── Game Screen ───────────────────────────────────────────── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      background: var(--bg);
    }

    /* Header */
    #game-header {
      flex-shrink: 0;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(5,5,16,0.8);
      backdrop-filter: blur(16px);
      z-index: 10;
    }
    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 54px;
    }
    .hud-label { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .hud-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
    #hud-step-count { color: var(--current); }
    .hud-sep { flex: 1; }
    .puzzle-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* Content area */
    #game-content {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    /* Side panels */
    .side-panel {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      border-right: 1px solid var(--panel-border);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .panel-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* Path panel */
    #path-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .path-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      animation: fadeSlideIn 0.3s ease;
    }
    .path-item.current { border-color: rgba(0,245,212,0.3); background: rgba(0,245,212,0.05); }
    .path-item.start { border-color: rgba(0,245,212,0.2); }
    .path-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .path-dot.start { background: var(--current); }
    .path-dot.visited { background: var(--visited); }
    .path-dot.current { background: var(--current); box-shadow: 0 0 8px var(--current); }
    .path-word { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .path-sim { font-size: 10px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

    /* Canvas */
    #canvas-container {
      flex: 1;
      position: relative;
      min-width: 0;
      overflow: hidden;
    }
    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }


    /* Input bar */
    #input-bar {
      flex-shrink: 0;
      height: 76px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-top: 1px solid var(--panel-border);
      background: rgba(5,5,16,0.9);
      backdrop-filter: blur(16px);
    }
    .current-badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .current-badge-label { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
    #current-word-badge {
      font-size: 16px;
      font-weight: 700;
      color: var(--current);
      text-shadow: var(--glow-c);
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 8px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(0,245,212,0.4);
      box-shadow: 0 0 0 3px rgba(0,245,212,0.08);
    }
    .input-wrapper.shake { animation: shake 0.35s ease; }
    .input-wrapper.flash-green { animation: flashGreen 0.4s ease; }
    .input-wrapper.flash-gold { animation: flashGold 0.4s ease; }
    #word-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      caret-color: var(--current);
    }
    #word-input::placeholder { color: var(--muted); font-weight: 400; }
    #word-input:disabled { opacity: 0.5; }
    .btn-submit {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--current), #0ea5e9);
      color: var(--bg);
      font-size: 20px;
      font-weight: 700;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-submit:hover { transform: scale(1.05); box-shadow: 0 0 16px rgba(0,245,212,0.4); }
    .btn-submit:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
    .btn-give-up {
      flex-shrink: 0;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(255,107,107,0.2);
      color: rgba(255,107,107,0.5);
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-sm);
    }
    .btn-give-up:hover { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.4); color: var(--target); }
    .btn-undo {
      flex-shrink: 0;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid rgba(168,85,247,0.25);
      color: rgba(168,85,247,0.6);
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .btn-undo:hover:not(:disabled) { background: rgba(168,85,247,0.08); border-color: rgba(168,85,247,0.4); color: var(--visited); }
    .btn-undo:disabled { opacity: 0.3; cursor: not-allowed; }
    @media (max-width: 480px) { .btn-undo { padding: 8px 8px; } }
    .checking-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--current);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    .checking-spinner.visible { display: block; }

    /* ─── Win Screen ────────────────────────────────────────────── */
    #win-screen { display: none; background: transparent; z-index: 10; justify-content: flex-end; padding-bottom: 24px; }
    .win-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 480px;
      width: 90%;
      background: rgba(8,8,18,0.72);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      backdrop-filter: blur(10px);
    }
    .win-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--current), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(255,209,102,0.4));
    }
    .win-steps {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .win-steps .step-count { color: var(--gold); font-weight: 700; font-size: 48px; line-height: 1; }
    .win-steps .step-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .score-card {
      width: 100%;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .score-row .label { color: var(--muted); }
    .score-row .value { font-weight: 700; }
    .score-row.total {
      border-top: 1px solid var(--panel-border);
      padding-top: 12px;
      font-size: 18px;
    }
    .score-row.total .value { color: var(--gold); font-size: 24px; }
    .win-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    /* ─── In-Game Tutorial ───────────────────────────────────────── */
    #tut-stage {
      position: fixed; inset: 0; z-index: 150;
      display: none;
    }
    #tut-stage.active { display: block; }
    #tut-dim {
      position: absolute; inset: 0;
      pointer-events: all;
    }
    #tut-ring {
      position: fixed;
      border: 2px solid var(--current);
      box-shadow: 0 0 0 4000px rgba(5,5,16,0.80), 0 0 28px rgba(0,245,212,0.55);
      pointer-events: none;
      z-index: 151;
      transition: left 0.45s cubic-bezier(0.34,1.2,0.64,1),
                  top  0.45s cubic-bezier(0.34,1.2,0.64,1),
                  width 0.45s cubic-bezier(0.34,1.2,0.64,1),
                  height 0.45s cubic-bezier(0.34,1.2,0.64,1);
    }
    #tut-card {
      position: fixed;
      width: 272px;
      background: #0d0d24;
      border: 1px solid rgba(0,245,212,0.28);
      border-radius: 16px;
      padding: 20px 22px;
      display: flex; flex-direction: column; gap: 12px;
      pointer-events: all;
      z-index: 152;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    }
    #tut-step-counter {
      font-size: 10px; font-weight: 600; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase;
    }
    #tut-card-title { font-size: 15px; font-weight: 700; color: var(--text); }
    #tut-card-body  { font-size: 13px; line-height: 1.65; color: var(--muted); }
    #tut-card-body strong { color: var(--text); font-weight: 600; }
    .tut-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 4px;
    }
    #tut-ok-btn {
      padding: 8px 18px;
      background: linear-gradient(135deg, var(--current), #0ea5e9);
      color: var(--bg); font-size: 13px; font-weight: 700;
      border-radius: var(--radius-sm); border: none;
      cursor: pointer; transition: all 0.18s;
    }
    #tut-ok-btn:hover { transform: translateY(-1px); box-shadow: 0 0 14px rgba(0,245,212,0.4); }
    #tut-skip-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); font-size: 12px; font-family: inherit;
      padding: 6px; border-radius: var(--radius-sm); transition: color 0.18s;
    }
    #tut-skip-btn:hover { color: var(--text); }
    /* Small hint shown while waiting for the player to type */
    #tut-hint {
      position: fixed; bottom: 92px; left: 50%;
      transform: translateX(-50%);
      z-index: 152;
      background: rgba(0,245,212,0.10);
      border: 1px solid rgba(0,245,212,0.30);
      border-radius: 99px;
      padding: 7px 20px;
      font-size: 13px; font-weight: 500; color: var(--current);
      pointer-events: none;
      display: none;
      white-space: nowrap;
      animation: pulse 2s infinite;
    }

    /* ─── Toasts ────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      backdrop-filter: blur(12px);
      pointer-events: none;
      white-space: nowrap;
      animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.success  { background: rgba(0,245,212,0.15); border: 1px solid rgba(0,245,212,0.3); color: var(--current); }
    .toast.warning  { background: rgba(255,209,102,0.12); border: 1px solid rgba(255,209,102,0.3); color: var(--gold); }
    .toast.error    { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.3); color: var(--target); }
    .toast.neutral  { background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); color: var(--visited); }

    /* ─── Keyframe Animations ───────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-10px); }
      30% { transform: translateX(9px); }
      45% { transform: translateX(-7px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(2px); }
    }
    @keyframes flashGreen {
      0% { border-color: rgba(255,255,255,0.1); box-shadow: none; }
      40% { border-color: rgba(0,245,212,0.8); box-shadow: 0 0 20px rgba(0,245,212,0.3); }
      100% { border-color: rgba(0,245,212,0.4); box-shadow: none; }
    }
    @keyframes flashGold {
      0% { border-color: rgba(255,255,255,0.1); box-shadow: none; }
      40% { border-color: rgba(255,209,102,0.9); box-shadow: 0 0 24px rgba(255,209,102,0.4); }
      100% { border-color: rgba(255,255,255,0.1); box-shadow: none; }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes nodePop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ─── Custom Game Modal ────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,5,16,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-card {
      background: var(--bg2);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      width: 320px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: -10px;
    }
    .modal-field { display: flex; flex-direction: column; gap: 6px; }
    .modal-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .modal-input {

  <!-- ─── Loading animation (no dependencies) ──────────────── -->
  <script>
  (function () {
    const canvas = document.getElementById('loading-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, pts, animId;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    function init() {
      resize();
      pts = Array.from({ length: 50 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        r: Math.random() * 2 + 0.5,
      }));
    }
    function tick() {
      ctx.clearRect(0, 0, W, H);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,245,212,0.35)';
        ctx.fill();
      });
      ctx.strokeStyle = 'rgba(0,245,212,0.06)';
      ctx.lineWidth = 0.8;
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 140) {
            ctx.globalAlpha = (1 - d / 140) * 0.5;
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
      animId = requestAnimationFrame(tick);
    }
    window.stopLoadingAnim = function () { cancelAnimationFrame(animId); };
    window.addEventListener('resize', resize);
    init();
    tick();
  })();
  </script>
